# MicroCRM + ELK – tout en une commande
# Usage : docker-compose -f docker-compose.with-elk.yml up --build
# App  : http://localhost (front), http://localhost:8080 (back)
# Kibana : http://localhost:5601  |  Elasticsearch : http://localhost:9200

version: "3.8"

services:
  # ---------- Application ----------
  back:
    build:
      context: .
      dockerfile: Dockerfile
      target: back
    image: orion-microcrm-back:latest
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: elk
      LOGSTASH_HOST: logstash

  front:
    build:
      context: .
      dockerfile: Dockerfile
      target: front
    image: orion-microcrm-front:latest
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - back

  # ---------- Stack ELK ----------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: es01
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 15

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: logstash
    volumes:
      - ./elk/logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044"
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
