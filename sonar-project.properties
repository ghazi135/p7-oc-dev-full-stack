# SonarQube Cloud – projet MicroCRM (monorepo back + front)
# À configurer dans GitHub : Secrets (SONAR_TOKEN) et Variables (SONAR_PROJECT_KEY, SONAR_ORGANIZATION)

sonar.projectKey=${env.SONAR_PROJECT_KEY}
sonar.organization=${env.SONAR_ORGANIZATION}

# Sources back (Java) et front (TypeScript)
sonar.sources=back/src/main/java,front/src
# Binaires Java (générés par ./gradlew build) – avec modules, voir back.sonar.* dans le workflow
sonar.java.binaries=back/build/classes/java/main
# sonar.java.libraries désactivé : avec modules (projectBaseDir=back), le chemin est relatif à back/
# Défini dans CI : back.sonar.java.libraries=build/libs/*.jar

# Exclusions (build, dépendances, specs)
sonar.exclusions=**/node_modules/**,**/dist/**,**/.angular/**,**/*.spec.ts,**/build/**,**/target/**

# Encodage
sonar.sourceEncoding=UTF-8
