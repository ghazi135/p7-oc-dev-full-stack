# Pipeline CI/CD – MicroCRM (P7)
# Étape 3 : CI (build, tests, SonarQube Cloud)
# Étape 5 : CD (publication des images Docker sur GHCR)

name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  JAVA_VERSION: "17"
  NODE_VERSION: "20"
  # Docker Hub : définir les variables DOCKERHUB_USERNAME et le secret DOCKERHUB_TOKEN
  DOCKER_REGISTRY: docker.io

jobs:
  # ---------- Backend : build et tests ----------
  back-build-test:
    name: Backend – Build & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: "gradle"

      - name: Grant execute permission for gradlew
        run: chmod +x back/gradlew

      - name: Build and test (Gradle)
        run: cd back && ./gradlew build --no-daemon

      - name: Upload JAR (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: back-jar
          path: back/build/libs/microcrm-*.jar

  # ---------- Frontend : build et tests ----------
  front-build-test:
    name: Frontend – Build & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install Chrome (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: cd front && npm ci

      - name: Build (production)
        run: cd front && npm run build

      - name: Run unit tests
        run: cd front && npm test -- --no-watch --browsers=ChromeHeadlessNoSandbox
        env:
          CHROME_BIN: /usr/bin/google-chrome-stable

  # ---------- SonarQube Cloud (analyse qualité / sécurité) ----------
  # Activer en créant une variable de dépôt ACTIVATE_SONAR = 'true' et en renseignant
  # les secrets SONAR_TOKEN, et variables SONAR_PROJECT_KEY, SONAR_ORGANIZATION.
  # Sur SonarCloud : désactiver "Automatic Analysis" (Administration projet ou organisation)
  # pour éviter l'erreur "CI analysis while Automatic Analysis is enabled".
  sonarcloud:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    needs: [back-build-test, front-build-test]
    if: vars.ACTIVATE_SONAR == 'true'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: "gradle"

      - name: Build backend and run tests with coverage (JaCoCo)
        run: |
          chmod +x back/gradlew
          cd back && ./gradlew build jacocoTestReport --no-daemon

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install Chrome (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install and build frontend
        run: cd front && npm ci && npm run build

      - name: Run frontend tests with coverage (LCOV)
        run: cd front && npm test -- --no-watch --browsers=ChromeHeadlessNoSandbox --code-coverage
        env:
          CHROME_BIN: /usr/bin/google-chrome-stable

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.sources=back/src/main/java,front/src
            -Dsonar.java.binaries=back/build/classes/java/main
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/.angular/**,**/*.spec.ts,**/build/**,**/target/**
            -Dsonar.coverage.jacoco.xmlReportPaths=back/build/reports/jacoco/test/jacocoTestReport.xml
            -Dsonar.javascript.lcov.reportPaths=front/coverage/microcrm/lcov.info

  # ---------- CD : build et push des images Docker vers Docker Hub (main/master) ----------
  docker-build-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: [back-build-test, front-build-test]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME || github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (front)
        id: meta-front
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME || github.repository_owner }}/microcrm-front
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push image front
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: front
          push: true
          tags: ${{ steps.meta-front.outputs.tags }}
          labels: ${{ steps.meta-front.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (back)
        id: meta-back
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME || github.repository_owner }}/microcrm-back
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push image back
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: back
          push: true
          tags: ${{ steps.meta-back.outputs.tags }}
          labels: ${{ steps.meta-back.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (standalone)
        id: meta-standalone
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME || github.repository_owner }}/microcrm-standalone
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push image standalone
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: standalone
          push: true
          tags: ${{ steps.meta-standalone.outputs.tags }}
          labels: ${{ steps.meta-standalone.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
