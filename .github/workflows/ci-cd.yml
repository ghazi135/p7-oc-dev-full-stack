# =============================================================================
# Pipeline CI/CD – MicroCRM (P7) – Option B (Orion)
# =============================================================================
# Ce workflow assure :
#   - CI : build et tests (backend Java + frontend Angular) à chaque push/PR
#   - Analyse qualité/sécurité : SonarQube Cloud (optionnel, si ACTIVATE_SONAR=true)
#   - CD : build et publication des images Docker vers Docker Hub (uniquement sur push main/master)
#   - Release : après CD, création d’un tag vX.Y.Z et d’une release GitHub avec JAR + build Angular
# =============================================================================

name: CI/CD

# -----------------------------------------------------------------------------
# Déclencheurs : quand le pipeline s'exécute
# -----------------------------------------------------------------------------
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# -----------------------------------------------------------------------------
# Variables d'environnement globales (réutilisées dans les jobs)
# -----------------------------------------------------------------------------
env:
  JAVA_VERSION: "17"
  NODE_VERSION: "20"
  # Registre Docker : Docker Hub (docker.io). Pour GHCR : ghcr.io
  DOCKER_REGISTRY: docker.io

jobs:
  # ===========================================================================
  # JOB 1 : Backend – Build et tests (Java / Spring Boot / Gradle)
  # ===========================================================================
  back-build-test:
    name: Backend – Build & Tests
    runs-on: ubuntu-latest
    steps:
      # Récupération du code source depuis le dépôt
      - name: Checkout
        uses: actions/checkout@v4

      # Installation du JDK 17 (Temurin) avec cache Gradle pour accélérer les runs suivants
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: "gradle"

      # gradlew doit être exécutable sur l'environnement Linux du runner
      - name: Grant execute permission for gradlew
        run: chmod +x back/gradlew

      # Compilation, exécution des tests JUnit et génération du JAR (+ rapport JaCoCo si configuré dans build.gradle)
      - name: Build and test (Gradle)
        run: cd back && ./gradlew build --no-daemon

      # Sauvegarde du JAR en artifact (disponible pour les jobs suivants si besoin ; CD rebuild depuis les sources)
      - name: Upload JAR (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: back-jar
          path: back/build/libs/microcrm-*.jar

  # ===========================================================================
  # JOB 2 : Frontend – Build et tests (Angular / npm / Karma)
  # ===========================================================================
  front-build-test:
    name: Frontend – Build & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node.js 20 avec cache npm (package-lock.json du front uniquement)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      # Karma/Jasmine nécessitent un navigateur : Chrome headless pour les tests sans interface
      - name: Install Chrome (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # Installation reproductible des dépendances (utilise package-lock.json)
      - name: Install dependencies
        run: cd front && npm ci

      # Build de production (optimisation, assets)
      - name: Build (production)
        run: cd front && npm run build

      # Tests unitaires en mode headless ; pas de watch pour la CI
      - name: Run unit tests
        run: cd front && npm test -- --no-watch --browsers=ChromeHeadlessNoSandbox
        env:
          CHROME_BIN: /usr/bin/google-chrome-stable

  # ===========================================================================
  # JOB 3 : SonarQube Cloud – Analyse statique (qualité, sécurité, couverture)
  # ===========================================================================
  # Exécuté seulement si la variable de dépôt ACTIVATE_SONAR = 'true'
  # Dépend des jobs back et front : on rebuilde ici pour générer les rapports de couverture (JaCoCo, LCOV)
  sonarcloud:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    needs: [back-build-test, front-build-test]
    if: vars.ACTIVATE_SONAR == 'true'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Backend : build + rapport JaCoCo pour la couverture SonarQube ---
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: "gradle"

      - name: Build backend and run tests with coverage (JaCoCo)
        run: |
          chmod +x back/gradlew
          cd back && ./gradlew build jacocoTestReport --no-daemon

      # --- Frontend : build + tests avec couverture LCOV ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install Chrome (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install and build frontend
        run: cd front && npm ci && npm run build

      - name: Run frontend tests with coverage (LCOV)
        run: cd front && npm test -- --no-watch --browsers=ChromeHeadlessNoSandbox --code-coverage
        env:
          CHROME_BIN: /usr/bin/google-chrome-stable

      # --- Scan SonarQube : 1 projet, 2 modules (back, front) pour rapports séparés ---
      # Configurer : Secrets → SONAR_TOKEN ; Variables → SONAR_PROJECT_KEY, SONAR_ORGANIZATION, ACTIVATE_SONAR
      - name: SonarQube Cloud Scan (1 projet, modules back + front)
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.modules=back,front
            -Dsonar.sources=
            -Dsonar.java.libraries=
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/.angular/**,**/*.spec.ts,**/build/**,**/target/**
            -Dback.sonar.projectName=Backend
            -Dback.sonar.sources=src/main/java
            -Dback.sonar.projectBaseDir=back
            -Dback.sonar.java.binaries=build/classes/java/main
            -Dback.sonar.java.libraries=build/libs/*.jar
            -Dback.sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml
            -Dfront.sonar.projectName=Frontend
            -Dfront.sonar.sources=src
            -Dfront.sonar.projectBaseDir=front
            -Dfront.sonar.javascript.lcov.reportPaths=coverage/microcrm/lcov.info

  # ===========================================================================
  # JOB 4 : CD – Build et push des images Docker vers Docker Hub
  # ===========================================================================
  # Exécuté uniquement sur push vers main ou master (pas sur pull request)
  # Construit les 3 cibles du Dockerfile : front, back, standalone
  # Configurer : Secrets → DOCKERHUB_TOKEN ; Variables (optionnel) → DOCKERHUB_USERNAME
  docker-build-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: [back-build-test, front-build-test]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Buildx permet le build multi-plateforme et le cache (type=gha)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authentification au registre (Docker Hub)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME || github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- Image Frontend (cible "front" du Dockerfile) ---
      - name: Extract metadata (front)
        id: meta-front
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME || github.repository_owner }}/microcrm-front
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push image front
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: front
          push: true
          tags: ${{ steps.meta-front.outputs.tags }}
          labels: ${{ steps.meta-front.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Image Backend (cible "back" du Dockerfile) ---
      - name: Extract metadata (back)
        id: meta-back
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME || github.repository_owner }}/microcrm-back
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push image back
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: back
          push: true
          tags: ${{ steps.meta-back.outputs.tags }}
          labels: ${{ steps.meta-back.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Image Standalone (front + back dans un seul conteneur, cible "standalone") ---
      - name: Extract metadata (standalone)
        id: meta-standalone
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME || github.repository_owner }}/microcrm-standalone
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push image standalone
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: standalone
          push: true
          tags: ${{ steps.meta-standalone.outputs.tags }}
          labels: ${{ steps.meta-standalone.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # JOB 5 : Release – Tag vX.Y.Z + release GitHub (JAR + build Angular)
  # ===========================================================================
  # Exécuté après le CD (push main/master). Crée un tag et une release avec les artefacts.
  create-release:
    name: Create Release (tag + artefacts)
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version (from build.gradle)
        id: version
        run: |
          RAW=$(grep "^version = " back/build.gradle | sed "s/version = ['\"]\(.*\)['\"]/\1/" | tr -d "'\"")
          V="${RAW%-SNAPSHOT}"
          [ -z "$V" ] && V="0.0.1"
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "tag=v$V" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: "gradle"

      - name: Build backend (JAR)
        run: |
          chmod +x back/gradlew
          cd back && ./gradlew build --no-daemon -x test

      - name: Copy JAR for release
        run: |
          mkdir -p release
          cp back/build/libs/microcrm-*.jar release/microcrm.jar

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Build frontend (Angular)
        run: cd front && npm ci && npm run build

      - name: Prepare frontend archive
        run: |
          if [ -d front/dist/microcrm/browser ]; then
            (cd front/dist/microcrm/browser && zip -r ../../../../front-dist.zip . -x "*.map")
          else
            (cd front/dist/microcrm && zip -r ../../../front-dist.zip . -x "*.map")
          fi

      - name: Create Release (tag + assets)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          skip_if_tag_exists: true
          files: |
            release/microcrm.jar
            front-dist.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
